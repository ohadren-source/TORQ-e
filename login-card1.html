<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medicaid Clarity System</title>
    <link rel="icon" type="image/png" href="/static/branding/logo/TdST.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1e5631 0%, #2d6a4f 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            position: relative;
        }

        .home-link {
            position: absolute;
            top: 0;
            left: 0;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 14px;
            padding: 8px 12px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .home-link:hover {
            color: white;
            border-color: rgba(255, 255, 255, 0.6);
            background: rgba(255, 255, 255, 0.1);
        }

        .logo {
            width: 40px;
            height: 40px;
        }

        .header h1 {
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: 16px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 4px;
        }

        .header .subtitle {
            font-size: 14px;
            color: #f97316;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .login-card {
            background: white;
            border-radius: 12px;
            padding: 48px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .aliases {
            background: #f0f8f5;
            border-left: 4px solid #2d6a4f;
            border-radius: 4px;
            padding: 12px 16px;
            margin-bottom: 32px;
            font-size: 13px;
            color: #2d6a4f;
            line-height: 1.6;
        }

        .aliases strong {
            display: block;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #1e5631;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: #2d6a4f;
            box-shadow: 0 0 0 3px rgba(45, 106, 79, 0.1);
        }

        .form-group input[type="password"]:disabled {
            background: #f5f5f5;
            color: #999;
            cursor: not-allowed;
        }

        .password-note {
            font-size: 11px;
            color: #999;
            margin-top: 4px;
            font-style: italic;
        }

        .button-group {
            display: flex;
            gap: 12px;
        }

        .btn {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-back {
            background: #e0e0e0;
            color: #333;
        }

        .btn-back:hover {
            background: #d0d0d0;
        }

        .btn-continue {
            background: #2d6a4f;
            color: white;
        }

        .btn-continue:hover:not(:disabled) {
            background: #1e5631;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(45, 106, 79, 0.3);
        }

        .btn-continue:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .btn-login {
            background: #2d6a4f;
            color: white;
            width: 100%;
        }

        .btn-login:hover:not(:disabled) {
            background: #1e5631;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(45, 106, 79, 0.3);
        }

        .footer-link {
            text-align: center;
            margin-top: 24px;
        }

        .footer-link a {
            color: #2d6a4f;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .footer-link a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            .login-card {
                padding: 32px 24px;
            }

            .name-options {
                grid-template-columns: 1fr;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="landing.html" class="home-link">← Home</a>
            <img src="/static/branding/logo/TdST.png" alt="TORQ-e Logo" class="logo">
            <h1>TORQ-e</h1>
            <p>Medicaid Clarity System</p>
            <span class="subtitle">Member Eligibility</span>
        </div>

        <div class="login-card">
            <div class="aliases">
                <strong>Member</strong>
                Also known as: Client, Recipient, or Beneficiary
            </div>

            <div class="form-group">
                <label for="username">Username or Email</label>
                <input
                    type="text"
                    id="username"
                    placeholder="Enter your username or email"
                    required
                    autofocus
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    placeholder="Enter your password"
                    disabled
                >
                <div class="password-note">Password authentication enabled in production</div>
            </div>

            <button class="btn btn-login" id="loginBtn">Enter as Member</button>

            <div class="footer-link">
                <a href="tutorial-card1.html" style="margin-right: 16px;">📖 Tutorial</a>
                <a href="landing.html">← Back to Card Selection</a>
            </div>
        </div>
    </div>

    <script>
        const usernameInput = document.getElementById('username');
        const loginBtn = document.getElementById('loginBtn');

        // Login button click
        loginBtn.addEventListener('click', () => {
            if (usernameInput.value.trim()) {
                sessionStorage.setItem('username', usernameInput.value);
                sessionStorage.setItem('userType', 'Member');
                sessionStorage.setItem('cardNumber', '1');
                window.location.href = 'chat-card1.html';
            }
        });

        // Allow Enter key to submit
        usernameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && usernameInput.value.trim()) {
                loginBtn.click();
            }
        });

        // Enable/disable login button
        usernameInput.addEventListener('input', () => {
            loginBtn.disabled = !usernameInput.value.trim();
        });

        // Initial state
        loginBtn.disabled = true;
    </script>
</body>
</html>
