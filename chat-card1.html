<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medicaid Clarity System</title>
    <link rel="icon" type="image/png" href="/static/branding/logo/TdST.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2d6a4f 0%, #1e5631 100%);
            color: white;
            padding: 16px 24px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }

        .home-link {
            position: absolute;
            left: 24px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 13px;
            padding: 6px 10px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .home-link:hover {
            color: white;
            border-color: rgba(255, 255, 255, 0.6);
            background: rgba(255, 255, 255, 0.1);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-left: 80px;
        }

        .logo {
            width: 32px;
            height: 32px;
        }

        .header-left h1 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .header-left p {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.8);
        }

        .header-right {
            text-align: right;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.8);
        }

        .header-right strong {
            display: block;
            color: white;
            font-size: 14px;
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: white;
        }

        .messages::-webkit-scrollbar {
            width: 8px;
        }

        .messages::-webkit-scrollbar-track {
            background: #f0f0f0;
        }

        .messages::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 4px;
        }

        .messages::-webkit-scrollbar-thumb:hover {
            background: #999;
        }

        .message {
            display: flex;
            gap: 12px;
            max-width: 100%;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.assistant {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
            line-height: 1.5;
            font-size: 14px;
        }

        .user .message-bubble {
            background: #1e5631;
            color: white;
        }

        .assistant .message-bubble {
            background: #e8e8e8;
            color: #333;
        }

        .message-attachment {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
            padding: 8px 12px;
            background: #f5f5f5;
            border-radius: 8px;
            display: inline-block;
        }

        .input-area {
            background: white;
            border-top: 1px solid #e0e0e0;
            padding: 16px 24px;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            font-size: 18px;
        }

        .icon-btn:hover {
            border-color: #1e5631;
            color: #1e5631;
        }

        .input-field {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-field textarea {
            flex: 1;
            padding: 12px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            min-height: 40px;
            max-height: 120px;
            transition: all 0.2s ease;
        }

        .input-field textarea:focus {
            outline: none;
            border-color: #1e5631;
            box-shadow: 0 0 0 3px rgba(45, 106, 79, 0.1);
        }

        .file-input {
            display: none;
        }

        .attached-files {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            font-size: 12px;
            color: #666;
        }

        .file-badge {
            background: #f0f8f5;
            border: 1px solid #1e5631;
            border-radius: 4px;
            padding: 4px 8px;
            color: #1e5631;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .file-badge .remove {
            cursor: pointer;
            font-weight: bold;
        }

        .send-btn {
            width: 40px;
            height: 40px;
            background: #1e5631;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s ease;
        }

        .send-btn:hover:not(:disabled) {
            background: #2d6a4f;
            transform: translateY(-2px);
        }

        .send-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .welcome-message {
            text-align: center;
            color: #999;
            padding: 40px 24px;
        }

        .welcome-message h2 {
            color: #1e5631;
            margin-bottom: 12px;
            font-size: 20px;
        }

        .welcome-message p {
            font-size: 14px;
            line-height: 1.6;
        }

        /* CLARITY LIGHT & ELABORATE STYLES */
        .clarity-light {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 12px 0;
            padding: 8px 12px;
            background: #f5f5f5;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
        }

        .clarity-light.green {
            color: #15803d;
        }

        .clarity-light.yellow {
            color: #ca8a04;
        }

        .clarity-light.red {
            color: #dc2626;
        }

        .light-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }

        .clarity-light.green .light-dot {
            background: #22c55e;
        }

        .clarity-light.yellow .light-dot {
            background: #eab308;
        }

        .clarity-light.red .light-dot {
            background: #ef4444;
        }

        .sources-citation {
            font-size: 11px;
            color: #666;
            margin: 8px 0;
            border-top: 1px solid #eee;
            padding-top: 8px;
            font-style: italic;
        }

        .sources-citation a {
            color: #1e5631;
            text-decoration: none;
            border-bottom: 1px dotted #1e5631;
            margin-right: 12px;
        }

        .sources-citation a:hover {
            text-decoration: underline;
        }

        .elaborate-btn {
            background: none;
            border: none;
            color: #1e5631;
            cursor: pointer;
            font-size: 13px;
            text-decoration: none;
            padding: 4px 0;
            margin-top: 8px;
            font-weight: 500;
        }

        .elaborate-btn:hover {
            text-decoration: underline;
        }

        .elaboration {
            margin-top: 12px;
            padding: 12px;
            background: #f9f9f9;
            border-left: 3px solid #1e5631;
            border-radius: 4px;
            font-size: 13px;
            line-height: 1.6;
            color: #555;
        }

        .elaboration strong {
            color: #1e5631;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }

            .message-bubble {
                max-width: 90%;
            }

            .input-area {
                padding: 12px 16px;
            }
        }
    </style>
</head>
<body>
    <div id="header-container"></div>
    <script>
        fetch('/torq-header.html')
            .then(r => r.text())
            .then(html => {
                const container = document.getElementById('header-container');
                const frag = document.createRange().createContextualFragment(html);
                container.appendChild(frag);
                if (typeof initTorqHeader === 'function') initTorqHeader();
            })
            .catch(e => console.log('Header not found:', e));
    </script>

    <div class="chat-container">
        <div class="messages" id="messages">
            <div class="message assistant">
                <div class="message-bubble">
                    <strong>👋 Welcome to TORQ-e Member Portal</strong><br><br>
                    I can help you with:<br>
                    • Check if you're covered by Medicaid<br>
                    • View your eligibility status and dates<br>
                    • Find recertification deadlines<br>
                    • Report income changes<br>
                    • Upload supporting documents<br><br>
                    What would you like to know?
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-actions">
                <button class="icon-btn" id="uploadBtn" title="Upload documents">📎</button>
            </div>
            <div class="input-field">
                <textarea id="inputText" placeholder="Ask about your eligibility, income, documents..." rows="1"></textarea>
                <div class="attached-files" id="attachedFiles"></div>
            </div>
            <button class="send-btn" id="sendBtn" disabled>➤</button>
        </div>
    </div>

    <input type="file" id="fileInput" class="file-input" multiple accept=".pdf,.jpg,.jpeg,.png,.docx,.doc,.txt">

    <!-- Markdown parser for response formatting -->
    <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.0.0/dist/markdown-it.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>

    <script>
        // Initialize markdown parser
        const md = window.markdownit({
            html: false,
            linkify: true,
            typographer: true,
            breaks: true
        });
        // Initialize from sessionStorage
        const username = sessionStorage.getItem('username') || 'Member';
        const cardNumber = sessionStorage.getItem('cardNumber');
        const umid = sessionStorage.getItem('umid');
        document.getElementById('userName').textContent = username;

        // SESSION CONTEXT CHECK: If user is logged in with UMID, use it automatically
        window.addEventListener('load', () => {
            if (umid) {
                const welcomeMsg = document.createElement('div');
                welcomeMsg.className = 'message assistant';
                welcomeMsg.innerHTML = `<div class="message-bubble">
                    <strong>✓ Welcome back, ${username}</strong><br>
                    I recognize your UMID: ${umid}<br><br>
                    You can ask me:<br>
                    • "What's my coverage status?"<br>
                    • "When do I need to recertify?"<br>
                    • "What if my income changes?"<br>
                    • "Help me upload documents"<br><br>
                    What would you like to know?
                </div>`;
                messagesDiv.appendChild(welcomeMsg);
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            }
        });

        const messagesDiv = document.getElementById('messages');
        const inputText = document.getElementById('inputText');
        const sendBtn = document.getElementById('sendBtn');
        const uploadBtn = document.getElementById('uploadBtn');
        const fileInput = document.getElementById('fileInput');
        const attachedFilesDiv = document.getElementById('attachedFiles');

        let attachedFiles = [];
        let conversationHistory = [];

        // Auto-resize textarea
        inputText.addEventListener('input', () => {
            inputText.style.height = 'auto';
            inputText.style.height = (inputText.scrollHeight) + 'px';
            sendBtn.disabled = !inputText.value.trim() && attachedFiles.length === 0;
        });

        // File upload
        uploadBtn.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            attachedFiles.push(...files);
            renderAttachedFiles();
            sendBtn.disabled = !inputText.value.trim() && attachedFiles.length === 0;
        });

        function renderAttachedFiles() {
            attachedFilesDiv.innerHTML = attachedFiles.map((file, idx) => `
                <div class="file-badge">
                    📄 ${file.name}
                    <span class="remove" onclick="removeFile(${idx})">✕</span>
                </div>
            `).join('');
        }

        window.removeFile = (idx) => {
            attachedFiles.splice(idx, 1);
            renderAttachedFiles();
            sendBtn.disabled = !inputText.value.trim() && attachedFiles.length === 0;
        };

        // Call Claude API with streaming
        async function callClaudeAPI(message, bubble) {
            const userType = sessionStorage.getItem('userType') || 'Member';
            const cardNum = parseInt(sessionStorage.getItem('cardNumber')) || 1;
            const sessionId = sessionStorage.getItem('sessionId') || 'session-' + Date.now();
            const userUmid = sessionStorage.getItem('umid'); // Get UMID from session

            try {
                const payload = {
                    message: message,
                    userType: userType,
                    cardNumber: cardNum,
                    sessionId: sessionId
                };

                // If user is logged in with UMID, include it so Claude knows they're authenticated
                if (userUmid) {
                    payload.umid = userUmid;
                    payload.context = `User is authenticated with UMID: ${userUmid}. Do not ask for Member ID - use their session UMID for eligibility checks.`;
                }

                const response = await fetch('/api/chat/stream', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    throw new Error(`API error: ${response.status}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                bubble.textContent = ''; // Clear "Thinking..." message

                let fullText = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const text = decoder.decode(value);
                    const lines = text.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                if (data.text) {
                                    fullText += data.text;
                                    // Show streaming progress with raw text
                                    bubble.textContent = fullText;
                                    messagesDiv.scrollTop = messagesDiv.scrollHeight;
                                }
                            } catch (e) {
                                // Skip malformed lines
                            }
                        }
                    }
                }

                // After streaming is complete, parse markdown and render as HTML
                const parsedHtml = md.render(fullText);
                const sanitized = DOMPurify.sanitize(parsedHtml);
                bubble.innerHTML = sanitized;
                messagesDiv.scrollTop = messagesDiv.scrollHeight;

                conversationHistory.push({ role: 'assistant', content: fullText });

            } catch (error) {
                console.error('Claude API error:', error);
                bubble.textContent = `❌ Error: ${error.message}. Make sure the backend is running and ANTHROPIC_API_KEY is configured.`;
            }
        }

        // Send message
        sendBtn.addEventListener('click', sendMessage);
        inputText.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        async function sendMessage() {
            const message = inputText.value.trim();
            if (!message && attachedFiles.length === 0) return;

            // Add user message to chat
            if (message) {
                const userDiv = document.createElement('div');
                userDiv.className = 'message user';
                userDiv.innerHTML = `<div class="message-bubble">${escapeHtml(message)}</div>`;
                messagesDiv.appendChild(userDiv);
                conversationHistory.push({ role: 'user', content: message });
            }

            // Show attached files
            if (attachedFiles.length > 0) {
                const filesDiv = document.createElement('div');
                filesDiv.className = 'message assistant';
                filesDiv.innerHTML = `<div class="message-bubble">
                    📎 Received ${attachedFiles.length} file(s): ${attachedFiles.map(f => f.name).join(', ')}
                </div>`;
                messagesDiv.appendChild(filesDiv);
            }

            inputText.value = '';
            inputText.style.height = 'auto';
            attachedFiles = [];
            renderAttachedFiles();
            sendBtn.disabled = true;

            // Scroll to bottom
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            // Create assistant message bubble for streaming response
            const assistantDiv = document.createElement('div');
            assistantDiv.className = 'message assistant';
            assistantDiv.id = 'streaming-response';
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.textContent = '⏳ Thinking...';
            assistantDiv.appendChild(bubble);
            messagesDiv.appendChild(assistantDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            // Call Claude API
            await callClaudeAPI(message, bubble);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Back to landing
        window.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'h') {
                window.location.href = 'landing.html';
            }
        });
    </script>
</body>
</html>
