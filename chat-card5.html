<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medicaid Clarity System</title>
    <link rel="icon" type="image/png" href="/static/branding/logo/TdST.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #1a237e 0%, #283593 100%);
            color: white;
            padding: 16px 24px;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }

        .home-link {
            position: absolute;
            left: 24px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            font-size: 13px;
            padding: 6px 10px;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 4px;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .home-link:hover {
            color: white;
            border-color: rgba(255,255,255,0.6);
            background: rgba(255,255,255,0.1);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-left: 80px;
        }

        .logo { width: 32px; height: 32px; }
        .header-left h1 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
        .header-left p { font-size: 12px; color: rgba(255,255,255,0.8); }
        .header-right { text-align: right; font-size: 12px; color: rgba(255,255,255,0.8); }
        .header-right strong { display: block; color: white; font-size: 14px; }

        .chat-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: white;
        }

        .messages::-webkit-scrollbar { width: 8px; }
        .messages::-webkit-scrollbar-track { background: #f0f0f0; }
        .messages::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
        .messages::-webkit-scrollbar-thumb:hover { background: #999; }

        .message {
            display: flex;
            gap: 12px;
            max-width: 100%;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user { justify-content: flex-end; }
        .message.assistant { justify-content: flex-start; }

        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
            line-height: 1.5;
            font-size: 14px;
        }

        .user .message-bubble { background: #283593; color: white; }
        .assistant .message-bubble { background: #e8e8e8; color: #333; }

        .input-area {
            background: white;
            border-top: 1px solid #e0e0e0;
            padding: 16px 24px;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-field { flex: 1; display: flex; flex-direction: column; gap: 8px; }

        .input-field textarea {
            flex: 1;
            padding: 12px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            min-height: 40px;
            max-height: 120px;
            transition: all 0.2s ease;
        }

        .input-field textarea:focus {
            outline: none;
            border-color: #283593;
            box-shadow: 0 0 0 3px rgba(40,53,147,0.1);
        }

        .send-btn {
            width: 40px;
            height: 40px;
            background: #283593;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s ease;
        }

        .send-btn:hover:not(:disabled) { background: #1a237e; transform: translateY(-2px); }
        .send-btn:disabled { background: #ccc; cursor: not-allowed; }

        .dev-notice {
            background: #e8eaf6;
            border-left: 4px solid #3f51b5;
            padding: 12px 16px;
            margin: 0;
            font-size: 12px;
            color: #283593;
        }

        /* authenticity risk Card */
        .authenticity-card {
            background: #f9f9f9;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 0;
            margin: 8px 0;
            overflow: hidden;
        }

        .authenticity-card-header {
            padding: 12px 16px;
            background: white;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .authenticity-card-header h3 { font-size: 14px; font-weight: 600; color: #333; margin: 0; }

        .risk-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .risk-badge.critical { background: #ffebee; color: #c62828; border: 1px solid #ef9a9a; }
        .risk-badge.high { background: #fff3e0; color: #e65100; border: 1px solid #ffcc80; }
        .risk-badge.medium { background: #fff8e1; color: #f57f17; border: 1px solid #ffe082; }
        .risk-badge.low { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
        .risk-badge.pending { background: #f3e5f5; color: #6a1b9a; border: 1px solid #ce93d8; }

        .authenticity-card-body { padding: 16px; }

        .risk-score-display {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
            padding: 12px;
            background: white;
            border-radius: 6px;
            border: 1px solid #e0e0e0;
        }

        .risk-score-circle {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            color: white;
            flex-shrink: 0;
        }

        .risk-score-circle.critical { background: linear-gradient(135deg, #c62828 0%, #b71c1c 100%); box-shadow: 0 0 20px rgba(198,40,40,0.4); }
        .risk-score-circle.high { background: linear-gradient(135deg, #e65100 0%, #bf360c 100%); box-shadow: 0 0 20px rgba(230,81,0,0.4); }
        .risk-score-circle.medium { background: linear-gradient(135deg, #f57f17 0%, #e65100 100%); box-shadow: 0 0 20px rgba(245,127,23,0.4); }
        .risk-score-circle.low { background: linear-gradient(135deg, #2e7d32 0%, #1b5e20 100%); box-shadow: 0 0 20px rgba(46,125,50,0.4); }
        .risk-score-circle.pending { background: linear-gradient(135deg, #6a1b9a 0%, #4a148c 100%); box-shadow: 0 0 20px rgba(106,27,154,0.4); }

        .risk-score-meta { flex: 1; }
        .risk-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.5px; }
        .risk-value { font-size: 18px; font-weight: 700; color: #333; }
        .risk-status { font-size: 12px; color: #666; margin-top: 2px; }

        .flags-section { margin-bottom: 12px; }
        .flags-section h4 { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .flags-section.red-flags h4 { color: #c62828; }
        .flags-section.green-flags h4 { color: #2e7d32; }

        .flag-item {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            padding: 6px 8px;
            border-radius: 4px;
            margin-bottom: 4px;
            font-size: 13px;
        }

        .flag-item.red { background: #ffebee; color: #c62828; }
        .flag-item.green { background: #e8f5e9; color: #2e7d32; }
        .flag-icon { flex-shrink: 0; font-weight: 700; }

        .action-buttons { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }

        .action-btn {
            padding: 8px 14px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .action-btn.primary { background: #283593; color: white; }
        .action-btn.primary:hover { background: #1a237e; }
        .action-btn.danger { background: #c62828; color: white; }
        .action-btn.danger:hover { background: #b71c1c; }
        .action-btn.secondary { background: #e0e0e0; color: #333; }
        .action-btn.secondary:hover { background: #ccc; }

        /* QA Checklist */
        .qa-checklist {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            overflow: hidden;
            margin: 8px 0;
        }

        .qa-checklist-header {
            padding: 12px 16px;
            background: #283593;
            color: white;
            font-size: 13px;
            font-weight: 600;
        }

        .qa-step { border-bottom: 1px solid #f0f0f0; padding: 12px 16px; }
        .qa-step:last-child { border-bottom: none; }
        .qa-step-title { font-size: 12px; font-weight: 700; color: #333; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }

        .qa-check-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #555;
            padding: 3px 0;
        }

        .check-box {
            width: 14px;
            height: 14px;
            border: 1.5px solid #ccc;
            border-radius: 2px;
            flex-shrink: 0;
        }

        /* Pattern cards */
        .pattern-grid { display: flex; flex-direction: column; gap: 8px; margin: 8px 0; }

        .pattern-card {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            padding: 12px;
            border-left: 4px solid #283593;
        }

        .pattern-card-title { font-size: 13px; font-weight: 700; color: #283593; margin-bottom: 4px; }
        .pattern-card-desc { font-size: 12px; color: #555; line-height: 1.5; }
        .pattern-card-threshold { font-size: 11px; color: #999; margin-top: 6px; font-style: italic; }

        /* Suggested questions */
        .suggested-questions { display: flex; flex-direction: column; gap: 6px; margin-top: 12px; }

        .suggest-btn {
            background: white;
            border: 1px solid #c5cae9;
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 12px;
            color: #283593;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
        }

        .suggest-btn:hover { background: #e8eaf6; border-color: #283593; }

        @media (max-width: 768px) {
            .header { flex-direction: column; align-items: flex-start; gap: 8px; }
            .message-bubble { max-width: 90%; }
            .input-area { padding: 12px 16px; }
        }
    </style>
</head>
<body>
    <div id="header-container"></div>

    <div class="dev-notice">
        &#x1F50D; Card 5 &mdash; UBADA Analyst Workbench. authenticity verification, data quality, pattern analysis. Same reader engine and URL universe as Card 4.
    </div>

    <div class="chat-container">
        <div class="messages" id="messages">
            <div class="message assistant">
                <div class="message-bubble">
                    <strong>&#x1F4CA; TORQ-e Analyst Workbench</strong><br><br>
                    Ask about authenticity, data quality, or billing patterns:<br><br>
                    <div class="suggested-questions">
                        <button class="suggest-btn" onclick="askSuggested('Is this provider inauthentic? NPI: ')">&#x1F50D; Is this provider inauthentic? (enter NPI or name)</button>
                        <button class="suggest-btn" onclick="askSuggested('What data quality checks should I run before analyzing?')">&#x2714; What data quality checks should I run?</button>
                        <button class="suggest-btn" onclick="askSuggested('Which billing patterns indicate potential inauthenticity, waste, or abuse?')">&#x26A0; Which billing patterns indicate authenticity?</button>
                        <button class="suggest-btn" onclick="askSuggested('Show me outlier detection results for this month')">&#x1F4C8; Show outlier detection results</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-field">
                <textarea id="inputText" placeholder="Ask about authenticity verification, data quality, billing patterns, provider verification..." rows="1"></textarea>
            </div>
            <button class="send-btn" id="sendBtn">&#x27A4;</button>
        </div>
    </div>

    <script>
        fetch('card4-5-header.html')
            .then(r => r.text())
            .then(html => {
                document.getElementById('header-container').innerHTML = html;
                const username = sessionStorage.getItem('username') || 'Analyst';
                const userNameEl = document.getElementById('userName');
                if (userNameEl) userNameEl.textContent = username;
            })
            .catch(e => console.log('Header not found (development mode):', e));

        const inputText = document.getElementById('inputText');
        const sendBtn = document.getElementById('sendBtn');
        const messagesDiv = document.getElementById('messages');
        const API_BASE = 'https://torq-e-production.up.railway.app/api/card5';

        inputText.addEventListener('input', () => {
            inputText.style.height = 'auto';
            inputText.style.height = (inputText.scrollHeight) + 'px';
        });

        inputText.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);

        function askSuggested(text) {
            inputText.value = text;
            inputText.focus();
            inputText.style.height = 'auto';
            inputText.style.height = (inputText.scrollHeight) + 'px';
        }

        async function sendMessage() {
            const message = inputText.value.trim();
            if (!message) return;
            addMessage(message, 'user');
            inputText.value = '';
            inputText.style.height = 'auto';
            sendBtn.disabled = true;
            try {
                const response = await processAnalystQuery(message);
                addMessage(response, 'assistant');
            } catch (error) {
                addMessage('Error: ' + error.message, 'assistant');
            } finally {
                sendBtn.disabled = false;
                inputText.focus();
            }
        }

        function renderMarkdown(text) {
            // Tables
            text = text.replace(/^\|(.+)\|$/gm, function(match) { return match; });
            const tableRegex = /((?:^\|.+\|
)+)/gm;
            text = text.replace(tableRegex, function(block) {
                const rows = block.trim().split('\n');
                let html = '<table class="md-table">';
                rows.forEach(function(row, i) {
                    if (/^\|[-| :]+\|$/.test(row)) return;
                    const cells = row.replace(/^\||\|$/g, '').split('|');
                    const tag = (i === 0) ? 'th' : 'td';
                    html += '<tr>' + cells.map(c => '<' + tag + '>' + c.trim() + '</' + tag + '>').join('') + '</tr>';
                });
                html += '</table>';
                return html;
            });
            // Code blocks
            text = text.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
            // Inline code
            text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
            // Headers
            text = text.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
            text = text.replace(/^### (.+)$/gm, '<h3>$1</h3>');
            text = text.replace(/^## (.+)$/gm, '<h2>$1</h2>');
            text = text.replace(/^# (.+)$/gm, '<h1>$1</h1>');
            // Bold
            text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            // Italic
            text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
            // HR
            text = text.replace(/^---+$/gm, '<hr>');
            // Blockquote
            text = text.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
            // Unordered list
            text = text.replace(/((?:^[*-] .+
?)+)/gm, function(block) {
                const items = block.trim().split('\n').map(l => '<li>' + l.replace(/^[*-] /, '') + '</li>').join('');
                return '<ul>' + items + '</ul>';
            });
            // Ordered list
            text = text.replace(/((?:^\d+\. .+
?)+)/gm, function(block) {
                const items = block.trim().split('\n').map(l => '<li>' + l.replace(/^\d+\. /, '') + '</li>').join('');
                return '<ol>' + items + '</ol>';
            });
            // Paragraphs — double newline → <br><br>
            text = text.replace(/\n\n/g, '<br><br>');
            text = text.replace(/\n/g, '<br>');
            return text;
        }

        function addMessage(text, role) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ' + role;
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.innerHTML = role === 'assistant' ? renderMarkdown(text) : text;
            messageDiv.appendChild(bubble);
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        async function processAnalystQuery(query) {
            const q = query.toLowerCase();
            if (q.includes('npi') || q.includes('provider') || q.includes('authenticity') || q.includes('inauthentic') || q.includes('shell') || q.includes('real')) {
                return await fetchauthenticityAssessment(query);
            }
            if (q.includes('data quality') || q.includes('qa') || q.includes('quality check') || q.includes('validate') || q.includes('checklist')) {
                return generateQAChecklist();
            }
            if (q.includes('pattern') || q.includes('billing') || q.includes('waste') || q.includes('abuse') || q.includes('anomal')) {
                return generateauthenticityPatterns();
            }
            if (q.includes('outlier') || q.includes('detection') || q.includes('claims')) {
                return await fetchOutlierDetection(query);
            }
            return await elaborateAnalystInline(query);
        }

        async function fetchauthenticityAssessment(query) {
            try {
                const response = await fetch(API_BASE + '/explore-claims', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query, analysis_type: 'authenticity_assessment' })
                });
                if (!response.ok) throw new Error('API returned ' + response.status);
                const result = await response.json();
                return renderauthenticityCard(result, query);
            } catch (error) {
                return renderauthenticityCard(null, query);
            }
        }

        function renderauthenticityCard(result, query) {
            const score = result && result.authenticity_risk_score != null ? result.authenticity_risk_score : null;
            const riskLevel = score != null
                ? (score >= 86 ? 'critical' : score >= 61 ? 'high' : score >= 31 ? 'medium' : 'low')
                : 'pending';
            const riskLabel = {
                critical: 'CRITICAL RISK',
                high: 'HIGH RISK',
                medium: 'MEDIUM RISK',
                low: 'LOW RISK',
                pending: 'ANALYSIS PENDING'
            }[riskLevel];

            const redFlags = result && result.red_flags ? result.red_flags : [
                'Address verification pending',
                'Billing volume not yet cross-referenced',
                'Network status unconfirmed'
            ];
            const greenFlags = result && result.green_flags ? result.green_flags : [
                'NPI format valid',
                'Query logged to audit trail'
            ];
            const actionLabel = {
                critical: 'Immediate action required',
                high: 'Flag for investigation',
                medium: 'Request documentation',
                low: 'Monitor — no action required',
                pending: 'Connect Railway backend for live scores'
            }[riskLevel];

            let html = '<div class="authenticity-card">';
            html += '<div class="authenticity-card-header"><h3>&#x1F6A8; Provider authenticity risk Assessment</h3>';
            html += '<span class="risk-badge ' + riskLevel + '">' + riskLabel + '</span></div>';
            html += '<div class="authenticity-card-body">';

            html += '<div class="risk-score-display">';
            html += '<div class="risk-score-circle ' + riskLevel + '">' + (score != null ? score : '?') + '</div>';
            html += '<div class="risk-score-meta">';
            html += '<div class="risk-label">authenticity score</div>';
            html += '<div class="risk-value">' + (score != null ? score + ' / 100' : 'Live API unavailable') + '</div>';
            html += '<div class="risk-status">' + actionLabel + '</div>';
            html += '</div></div>';

            html += '<div class="flags-section red-flags"><h4>&#x2718; Red Flags Detected</h4>';
            redFlags.forEach(f => {
                html += '<div class="flag-item red"><span class="flag-icon">&#x2717;</span>' + f + '</div>';
            });
            html += '</div>';

            html += '<div class="flags-section green-flags"><h4>&#x2714; Green Flags</h4>';
            greenFlags.forEach(f => {
                html += '<div class="flag-item green"><span class="flag-icon">&#x2713;</span>' + f + '</div>';
            });
            html += '</div>';

            html += '<div class="action-buttons">';
            html += '<button class="action-btn danger" onclick="elaborateAnalyst(\'authenticity\')">&#x1F6A8; Flag for Investigation</button>';
            html += '<button class="action-btn primary" onclick="elaborateAnalyst(\'authenticity\')">&#x1F4DD; Request Documentation</button>';
            html += '<button class="action-btn secondary" onclick="elaborateAnalyst(\'authenticity\')">&#x1F4CA; Full Claude Analysis</button>';
            html += '</div></div></div>';
            return html;
        }

        function generateQAChecklist() {
            let html = '<div class="qa-checklist">';
            html += '<div class="qa-checklist-header">&#x2714; Data Quality Pre-Analysis Checklist</div>';
            const steps = [
                { title: 'Step 1: Completeness Check', checks: ['Count total records vs expected volume', 'Missing values by field (&lt;2% acceptable)', 'Identify null/blank fields', 'Check for truncated data'] },
                { title: 'Step 2: Accuracy Check', checks: ['Valid date formats (YYYY-MM-DD)', 'Logical date ranges (service date &lt; claim date)', 'Valid ZIP codes and addresses', 'Valid CPT/HCPCS procedure codes', 'Valid ICD-10 diagnosis codes', 'Provider IDs exist (NPI lookup)', 'Member IDs exist (UMID lookup)'] },
                { title: 'Step 3: Consistency Check', checks: ['No duplicate claims (same claim submitted twice)', 'Beneficiary demographic consistency (name/DOB match)', 'Units match service type', 'Dates align with plan rules'] },
                { title: 'Step 4: Outlier Check', checks: ['Unusually high charges (&gt;$50K claim = verify)', 'Unusual service combinations', 'Provider billing unusual volume', 'Member with unusual utilization patterns'] }
            ];
            steps.forEach(step => {
                html += '<div class="qa-step"><div class="qa-step-title">' + step.title + '</div>';
                step.checks.forEach(check => {
                    html += '<div class="qa-check-item"><div class="check-box"></div>' + check + '</div>';
                });
                html += '</div>';
            });
            html += '</div>';
            html += '<br><button class="action-btn primary" onclick="elaborateAnalyst(\'quality\')">&#x1F4CA; Run Automated QA via Claude</button>';
            return html;
        }

        function generateauthenticityPatterns() {
            const patterns = [
                { title: 'Duplicate Billing', desc: 'Same service billed 2+ times. Emergency room visit billed 3 times.', threshold: '&lt;1% acceptable, &gt;2% = investigate' },
                { title: 'Billing Outside Hours', desc: 'Services billed at 2AM by a clinic with listed business hours.', threshold: 'Claims outside facility hours = automatic flag' },
                { title: 'Unusual Code Combinations', desc: 'Services never billed together appearing on same claim.', threshold: 'Rule-based: incompatible codes = flag' },
                { title: 'Unbundling', desc: 'Bundled service billed as 10 separate line items to inflate payment.', threshold: 'Code combinations reviewed quarterly' },
                { title: 'Upcoding', desc: 'Higher-cost service billed instead of what was actually provided.', threshold: 'Compare documentation to diagnosis codes' },
                { title: 'Sudden Volume Spike', desc: 'Provider goes from 10 claims/month to 500 with no change in practice size.', threshold: 'Volume increase &gt;300% = investigate' },
                { title: 'Shell Provider', desc: 'Address is PO Box or residential. No physical facility found at listed address.', threshold: 'Address verification + site visit trigger' }
            ];
            let html = '<strong>&#x26A0; authenticity / Waste / Abuse Pattern Reference</strong><br><br>';
            html += '<div class="pattern-grid">';
            patterns.forEach(p => {
                html += '<div class="pattern-card">';
                html += '<div class="pattern-card-title">' + p.title + '</div>';
                html += '<div class="pattern-card-desc">' + p.desc + '</div>';
                html += '<div class="pattern-card-threshold">Threshold: ' + p.threshold + '</div>';
                html += '</div>';
            });
            html += '</div>';
            html += '<br><div style="font-size:11px;color:#666;padding:8px;background:#f5f5f5;border-radius:4px;">Risk thresholds: Low 0&ndash;30 &nbsp;|&nbsp; Medium 31&ndash;60 &nbsp;|&nbsp; High 61&ndash;85 &nbsp;|&nbsp; Critical 86&ndash;100</div>';
            html += '<br><button class="action-btn primary" onclick="elaborateAnalyst(\'patterns\')">&#x1F4CA; Run Pattern Detection via Claude</button>';
            return html;
        }

        async function fetchOutlierDetection(query) {
            try {
                const response = await fetch(API_BASE + '/outlier-detection', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query })
                });
                if (!response.ok) throw new Error('API returned ' + response.status);
                const result = await response.json();
                return '<strong>&#x1F4C8; Outlier Detection Results</strong><br><br><pre style="font-size:11px;white-space:pre-wrap;">' + JSON.stringify(result, null, 2) + '</pre>';
            } catch(e) {
                return await elaborateAnalystInline(query);
            }
        }

        async function elaborateAnalyst(type) {
            const thinkingId = 'thinking-' + Date.now();
            const thinkingDiv = document.createElement('div');
            thinkingDiv.className = 'message assistant';
            thinkingDiv.id = thinkingId;
            thinkingDiv.innerHTML = '<div class="message-bubble" style="color:#999;font-style:italic;">&#x23F3; Step 1 of 2: Crawling public repositories (OMIG, eMedNY, Health Data NY)&hellip;</div>';
            messagesDiv.appendChild(thinkingDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            sendBtn.disabled = true;

            const typeLabels = {
                authenticity: 'authenticity risk assessment and provider verification using OMIG and eMedNY public data',
                quality: 'data quality validation procedures and completeness checks for Medicaid claims data',
                patterns: 'billing pattern anomalies, authenticity indicators, and waste/abuse detection thresholds',
                default: 'analyst workbench capabilities for authenticity verification and data quality analysis'
            };

            try {
                document.getElementById(thinkingId).querySelector('.message-bubble').innerHTML =
                    '&#x23F3; Step 2 of 2: Claude analyzing sources for ' + (typeLabels[type] || 'analyst query') + '&hellip;';

                const chatResponse = await fetch('https://torq-e-production.up.railway.app/api/chat/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: 'Use your authenticity verification and data analysis tools to provide a detailed analysis of: ' + (typeLabels[type] || 'analyst request') + '. Call explore_claims_data or compute_outlier_scores. Report what public OMIG, eMedNY, and NYS Health repositories show, including authenticity patterns, data quality indicators, and confidence levels.',
                        userType: 'DataAnalyst',
                        cardNumber: 5
                    })
                });

                if (!chatResponse.ok) throw new Error('Claude API returned ' + chatResponse.status);

                const reader = chatResponse.body.getReader();
                const decoder = new TextDecoder();
                let fullText = '';
                let lineBuffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value, { stream: true });
                    const combined = lineBuffer + chunk;
                    const lines = combined.split('\n');
                    lineBuffer = lines.pop();
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                if (data.text) fullText += data.text;
                            } catch(e) {}
                        }
                    }
                }
                if (lineBuffer.startsWith('data: ')) {
                    try {
                        const data = JSON.parse(lineBuffer.slice(6));
                        if (data.text) fullText += data.text;
                    } catch(e) {}
                }

                document.getElementById(thinkingId).remove();
                addMessage(fullText || '<strong>&#x26A0;</strong> Claude completed analysis but returned no text.', 'assistant');

            } catch (error) {
                document.getElementById(thinkingId).remove();
                addMessage('<strong>&#x26A0; Analysis Error</strong><br>' + error.message, 'assistant');
            } finally {
                sendBtn.disabled = false;
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            }
        }

        async function elaborateAnalystInline(query) {
            sendBtn.disabled = true;
            const thinkingId = 'thinking-' + Date.now();
            const thinkingDiv = document.createElement('div');
            thinkingDiv.className = 'message assistant';
            thinkingDiv.id = thinkingId;
            thinkingDiv.innerHTML = '<div class="message-bubble" style="color:#999;font-style:italic;">&#x23F3; Analyzing via Claude&hellip;</div>';
            messagesDiv.appendChild(thinkingDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            try {
                const chatResponse = await fetch('https://torq-e-production.up.railway.app/api/chat/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: query,
                        userType: 'DataAnalyst',
                        cardNumber: 5
                    })
                });

                if (!chatResponse.ok) throw new Error('Claude API returned ' + chatResponse.status);

                const reader = chatResponse.body.getReader();
                const decoder = new TextDecoder();
                let fullText = '';
                let lineBuffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value, { stream: true });
                    const combined = lineBuffer + chunk;
                    const lines = combined.split('\n');
                    lineBuffer = lines.pop();
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                if (data.text) fullText += data.text;
                            } catch(e) {}
                        }
                    }
                }
                if (lineBuffer.startsWith('data: ')) {
                    try {
                        const data = JSON.parse(lineBuffer.slice(6));
                        if (data.text) fullText += data.text;
                    } catch(e) {}
                }

                document.getElementById(thinkingId).remove();
                sendBtn.disabled = false;
                return fullText || '<strong>&#x26A0;</strong> Claude completed but returned no text.';

            } catch (error) {
                document.getElementById(thinkingId).remove();
                sendBtn.disabled = false;
                return '<strong>&#x26A0; Error</strong><br>' + error.message;
            }
        }
