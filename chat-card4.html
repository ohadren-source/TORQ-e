<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medicaid Clarity System</title>
    <link rel="icon" type="image/png" href="/static/branding/logo/TdST.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #1e5631 0%, #2d6a4f 100%);
            color: white;
            padding: 16px 24px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }

        .home-link {
            position: absolute;
            left: 24px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 13px;
            padding: 6px 10px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .home-link:hover {
            color: white;
            border-color: rgba(255, 255, 255, 0.6);
            background: rgba(255, 255, 255, 0.1);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-left: 80px;
        }

        .logo {
            width: 32px;
            height: 32px;
        }

        .header-left h1 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .header-left p {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.8);
        }

        .header-right {
            text-align: right;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.8);
        }

        .header-right strong {
            display: block;
            color: white;
            font-size: 14px;
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: white;
        }

        .messages::-webkit-scrollbar {
            width: 8px;
        }

        .messages::-webkit-scrollbar-track {
            background: #f0f0f0;
        }

        .messages::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 4px;
        }

        .messages::-webkit-scrollbar-thumb:hover {
            background: #999;
        }

        .message {
            display: flex;
            gap: 12px;
            max-width: 100%;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.assistant {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
            line-height: 1.5;
            font-size: 14px;
        }

        .user .message-bubble {
            background: #2d6a4f;
            color: white;
        }

        .assistant .message-bubble {
            background: #e8e8e8;
            color: #333;
        }

        .input-area {
            background: white;
            border-top: 1px solid #e0e0e0;
            padding: 16px 24px;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-field {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-field textarea {
            flex: 1;
            padding: 12px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            min-height: 40px;
            max-height: 120px;
            transition: all 0.2s ease;
        }

        .input-field textarea:focus {
            outline: none;
            border-color: #2d6a4f;
            box-shadow: 0 0 0 3px rgba(45, 106, 79, 0.1);
        }

        .send-btn {
            width: 40px;
            height: 40px;
            background: #2d6a4f;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s ease;
        }

        .send-btn:hover:not(:disabled) {
            background: #1e5631;
            transform: translateY(-2px);
        }

        .send-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .dev-notice {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 12px 16px;
            margin: 0;
            font-size: 12px;
            color: #856404;
        }

        /* Spectrum Analyzer Styles */
        .spectrum-analyzer {
            background: #f9f9f9;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 0;
            margin: 8px 0;
            overflow: hidden;
        }

        .spectrum-section {
            border-bottom: 1px solid #e0e0e0;
        }

        .spectrum-section:last-child {
            border-bottom: none;
        }

        .spectrum-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
            padding: 12px;
            background: white;
            transition: background 0.2s ease;
        }

        .spectrum-header:hover {
            background: #f5f5f5;
        }

        .spectrum-header h3 {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toggle-icon {
            display: inline-block;
            font-size: 12px;
            transition: transform 0.2s ease;
        }

        .spectrum-content {
            padding: 12px;
            max-height: 800px;
            overflow: hidden;
            transition: all 0.3s ease;
            background: #fafafa;
        }

        .spectrum-content.collapsed {
            max-height: 0;
            padding: 0;
            overflow: hidden;
        }

        /* Coherence Level - Single Traffic Light */
        .coherence-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            padding: 20px;
        }

        .large-traffic-light {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            font-size: 32px;
            transition: all 0.3s ease;
        }

        .large-traffic-light.green {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            box-shadow: 0 0 30px rgba(76, 175, 80, 0.5);
